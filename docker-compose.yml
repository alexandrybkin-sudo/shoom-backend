version: '3.8'
services:
  frontend:
    build:
      context: /opt/shoom/frontend
      args:
        NEXT_PUBLIC_LIVEKIT_URL: wss://livekit.shoom.fun
        NEXT_PUBLIC_SOCKET_URL: https://shoom.fun
    env_file:
      - /opt/shoom/frontend/.env
    ports:
      - "3000:3000"
    restart: always
  backend:
    build:
      context: .
    env_file:
      - /opt/shoom/backend/.env
    ports:
      - "3001:3001"
    restart: always
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/shoom/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: always
    network_mode: host
